<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="icon" href="../global/images/logo.png">
    <link rel="stylesheet" href="../global/css/all.min.css">
    <link rel="stylesheet" href="../global/css/plugins/bootstrap.css">
    <link rel="stylesheet" href="css/plugins/swiper.css">
    <link rel="stylesheet" href="../global/css/global.css">
    <link rel="stylesheet" href="css/home.css">
</head>

<body>
    <div class="backgrounds"></div>
    <!-- *Navigation Bar -->
    <nav class="navbar navbar-expand-lg">
        <div class="effect"></div>
        <div class="container">
            <a class="navbar-brand" href="./index.html">
                <img src="../global/images/stream_logo.png" class="img-fluid" alt="">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span></span>
                <span class="middel my-2"></span>
                <span></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav m-auto mb-2 mb-lg-0 d-flex justify-content-center align-items-center">

                    <li class="nav-item link me-lg-3">
                        <a class="nav-link p-3 active" aria-current="page" href="./index.html">Home</a>
                    </li>

                    <li class="nav-item link ms-lg-3">
                        <a class="nav-link p-3" href="#">Categories</a>
                    </li>

                    <li class="nav-item link ms-lg-3">
                        <a class="nav-link p-3" href="../contact_us/contact.html">Contact Us</a>
                    </li>
                </ul>

                <ul class="navbar-nav icons d-flex align-items-center justify-content-center flex-row flex-wrap">

                </ul>
            </div>
        </div>
    </nav>

    <!-- * Header -->
    <header id="Home" class="mb-5">
        <div class="swiper mySwiper position-relative">
            <div class="swiper-wrapper">
            </div>
            <div class="ping part1 position-absolute">
                <div class="swiper-button-next icon d-none d-lg-flex"></div>
            </div>
            <div class="ping part2 position-absolute">
                <div class="swiper-button-prev icon d-none d-lg-flex"></div>
            </div>
        </div>
    </header>

    <!-- *section trending -->
    <section id="Trending" class="cardsMovies" data-name="trending">
        <div class="container">
            <div class="line-effect"></div>
            <div class="body d-flex align-items-center justify-content-between">
                <div class="head d-flex align-items-center justify-content-center">
                    <img src="images/bonfire.gif" alt="" class="img-fluid me-2 gif">
                    <h2 class="text-center mb-0"> Trending Movies </h2>
                </div>

                <div class="see-all">
                    <img src="images/abstract-shape.gif" alt="" class="img-fluid me-1 gif">
                    <a href="#" class="text-decoration-none">See All</a>
                </div>
            </div>

            <div class="content mt-5">
                <div class="container">
                    <div class="swiper moviesSwiper">
                        <div class="swiper-wrapper">

                        </div>
                        <div class="swiper-button-next arrow next"></div>
                        <div class="swiper-button-prev arrow prev"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!--* section popular -->
    <section id="Popular" class="mb-5 cardsMovies" data-name="popular">
        <div class="container">
            <div class="line-effect"></div>
            <div class="body d-flex align-items-center justify-content-between">
                <div class="head d-flex align-items-center justify-content-center">
                    <img src="images/bookmark.gif" alt="" class="img-fluid me-2 gif">
                    <h2 class="text-center mb-0"> Popular Movies</h2>
                </div>

                <div class="see-all">
                    <img src="images/abstract-shape.gif" alt="" class="img-fluid me-1 gif">
                    <a href="#" class="text-decoration-none">See All</a>
                </div>
            </div>

            <div class="content mt-5">
                <div class="container">
                    <div class="swiper moviesSwiper">
                        <div class="swiper-wrapper">

                        </div>
                        <div class="swiper-button-next arrow next"></div>
                        <div class="swiper-button-prev arrow prev"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!--* section Now playing -->
    <section id="Now" class="mb-5 cardsMovies" data-name="nowPlaying">
        <div class="container">
            <div class="line-effect"></div>
            <div class="body d-flex align-items-center justify-content-between">
                <div class="head d-flex align-items-center justify-content-center">
                    <img src="images/now.gif" alt="" class="img-fluid me-2 gif">
                    <h2 class="text-center mb-0"> Now Playing </h2>
                </div>

                <div class="see-all">
                    <img src="images/abstract-shape.gif" alt="" class="img-fluid me-1 gif">
                    <a href="#" class="text-decoration-none">See All</a>
                </div>
            </div>

            <div class="content mt-5">
                <div class="container">
                    <div class="swiper moviesSwiper">
                        <div class="swiper-wrapper">

                        </div>
                        <div class="swiper-button-next arrow next"></div>
                        <div class="swiper-button-prev arrow prev"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- * section top rated -->
    <section id="TopRated" class="mb-5 cardsMovies" data-name="topRated">
        <div class="container">
            <div class="line-effect"></div>
            <div class="body d-flex align-items-center justify-content-between">
                <div class="head d-flex align-items-center justify-content-center">
                    <img src="images/window-review.gif" alt="" class="img-fluid me-2 gif">
                    <h2 class="text-center mb-0"> Top Rated</h2>
                </div>

                <div class="see-all">
                    <img src="images/abstract-shape.gif" alt="" class="img-fluid me-1 gif">
                    <a href="#" class="text-decoration-none">See All</a>
                </div>
            </div>

            <div class="content mt-5">
                <div class="container">
                    <div class="swiper moviesSwiper">
                        <div class="swiper-wrapper">

                        </div>
                        <div class="swiper-button-next arrow next"></div>
                        <div class="swiper-button-prev arrow prev"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- * section upcoming -->
    <section id="Upcoming" class="mb-5 cardsMovies" data-name="upcoming">
        <div class="container">
            <div class="line-effect"></div>
            <div class="body d-flex align-items-center justify-content-between">
                <div class="head d-flex align-items-center justify-content-center">
                    <img src="images/coming-soon.gif" alt="" class="img-fluid me-2 gif">
                    <h2 class="text-center mb-0"> Upcoming</h2>
                </div>

                <div class="see-all">
                    <img src="images/abstract-shape.gif" alt="" class="img-fluid me-1 gif">
                    <a href="#" class="text-decoration-none">See All</a>
                </div>
            </div>

            <div class="content mt-5">
                <div class="container">
                    <div class="swiper moviesSwiper">
                        <div class="swiper-wrapper">

                        </div>
                        <div class="swiper-button-next arrow next"></div>
                        <div class="swiper-button-prev arrow prev"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- * popup video -->
    <div class="popup" data-name="video">
        <div class="box">
            <iframe width="100%" height="100%" allowfullscreen src="https://www.youtube-nocookie.com/embed/"
                frameborder="0"></iframe>
        </div>
    </div>


    <!--* popup cart -->
    <div class="popup" data-name="cart">
        <div class="box py-4 px-3">
            <div class="head mb-4">
                <p>Cart (1)</p>
                <div class="exit" onclick="closePopup()">
                    <i class="fa-solid fa-delete-left"></i>
                </div>
            </div>
            <div class="empty d-none justify-content-center align-items-center flex-column w-100 h-100 text-center">
                <div class="item">
                    <img src="images/empty-cart-img.png" class="img-fluid" alt="">
                    <p class="mb-0 mt-4">Your bag is empty add a few items</p>
                </div>
            </div>
            <div class="cards">
                <div class="row">
                    
                </div>
            </div>
        </div>
    </div>


    <!-- * Footer -->
    <footer class="py-4 mt-5">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-6">
                    <img src="../global/images/stream_logo.png" class="img-fluid" alt="">
                </div>
                <div class="col-6 text-center text-md-end">
                    <p class="mb-0">© 2024 Stream. All Rights Reserved</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/plugins/swiper.js"></script>
    <script src="../global/js/plugins/bootstrap.js"></script>
    <script src="../global/js/globalFunction.js"></script>
    <script src="js/homeFunction.js"></script>
    <script src="../global/js/global.js"></script>
    <script src="js/home.js"></script>

</html>
