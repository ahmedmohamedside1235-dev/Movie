<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../global/images/logo.png">
    <link rel="stylesheet" href="../global/css/all.min.css">
    <link rel="stylesheet" href="../global/css/global.css">
    <link rel="stylesheet" href="../global/css/plugins/bootstrap.css">
    <link rel="stylesheet" href="./css/detalis.css">
    <title>Details Movies</title>
</head>

<body class="overflow-hidden">
    <section id="Header" class="mb-5"></section>

    <section id="MovieData"></section>

    <!--* popup cart -->
    <div class="popup" data-name="cart">
        <div class="box py-4 px-3">
            <div class="head mb-4">
                <p>Cart (1)</p>
                <div class="exit" onclick="closePopup()">
                    <i class="fa-solid fa-delete-left"></i>
                </div>
            </div>
            <div class="empty d-none justify-content-center align-items-center flex-column w-100 h-100 text-center">
                <div class="item">
                    <img src="../Home/images/empty-cart-img.png" class="img-fluid" alt="">
                    <p class="mb-0 mt-4">Your bag is empty add a few items</p>
                </div>
            </div>
            <div class="cards">
                <div class="row">

                </div>
            </div>
        </div>
    </div>

    <!-- * Footer -->
    <footer class="py-4 mt-5">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-6">
                    <img src="../global/images/stream_logo.png" class="img-fluid" alt="">
                </div>
                <div class="col-6 text-center text-md-end">
                    <p class="mb-0">© 2024 Stream. All Rights Reserved</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- * loading padge -->
    <div class="loading" id="LoadingPage">
        <div class="content">
            <div class="line_left"></div>
            <div class="line_right"></div>
            <div class="curtain curtain_left "></div>
            <div class="curtain curtain_right"></div>
            <div class="stars-bg" id="starsContainer"></div>
            <div class="body h-100 w-100 d-flex justify-content-center align-items-center">
                <div class="layout d-flex justify-content-center align-items-center flex-column">
                    <img src="../global/images/clapperboard.gif" class="img-fluid mb-4" alt="">
                    <h2>Streamit</h2>
                    <p class="mb-5">Your World of Cinema</p>
                    <div class="load mb-2">
                        <span class="load-line"></span>
                        <span class="rate w-100 d-flex justify-content-between">
                            <span class="d-block loa">Loading</span>
                            <span class="color">50%</span>
                        </span>
                    </div>
                    <div class="lines mb-5 d-flex justify-content-center align-items-center">
                        <div class="lines-load me-1 line_20"></div>
                        <div class="lines-load me-1 line_40"></div>
                        <div class="lines-load me-1 line_60"></div>
                        <div class="lines-load me-1 line_80"></div>
                        <div class="lines-load line_100"></div>
                    </div>
                    <div class="success-info text-center" id="successReveal">
                        <div class="success-top successful"></div>
                        <div class="success-main">Lights . Camera . Action</div>
                        <div class="success-sub">Welcome to the experience</div>
                        <div class="success-buttom successful"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../global/js/globalFunction.js"></script>
    <script src="../global/js/global.js"></script>
    <script src="../global/js/plugins/bootstrap.js"></script>
    <script src="js/detailsFunction.js"></script>
    <script src="js/details.js"></script>
</body>

</html>
