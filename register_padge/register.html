<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="icon" href="../global/images/logo.png">
    <link rel="stylesheet" href="../global/css/plugins/bootstrap.css">
    <link rel="stylesheet" href="../global/css/global.css">
    <link rel="stylesheet" href="css/register.css">
</head>

<body>
    <div id="Register" class="py-5">
        <div class="container d-flex justify-content-center align-items-center h-100">
            <div class="content">
                <div class="data py-3 px-5 rounded-3">
                    <div class="logo mb-3">
                        <img src="../global/images/stream_logo.png" class="img-fluid" alt="">
                    </div>
                    <form method="post">
                        <div class="mb-4 inputs">
                            <label for="exampleInputEmail1" class="form-label mb-2">Username <span
                                    class="mainColor">*</span></label>
                            <input placeholder="Enter Your Name" type="text" class="form-control" name="name"
                                id="exampleInputEmail1" aria-describedby="emailHelp" autocomplete="off" required>
                            <div class="alert mb-0 d-none ">invalid Name</div>
                        </div>
                        <div class="mb-4 inputs">
                            <label for="exampleInputEmail1" class="form-label mb-2">Email <span
                                    class="mainColor">*</span></label>
                            <input placeholder="Enter Your Email" type="text" name="email" class="form-control"
                                id="exampleInputEmail1" aria-describedby="emailHelp" autocomplete="off" required>
                            <div class="alert mb-0 d-none">invalid email (examble@gmail.com)</div>
                        </div>
                        <div class="mb-4 inputs">
                            <label for="exampleInputPassword1" class="form-label mb-2">Password <span
                                    class="mainColor">*</span></label>
                            <input placeholder="Enter Your Password" type="password" name="password"
                                class="form-control" id="exampleInputPassword1" autocomplete="off" required>
                            <div class="alert mb-0 d-none">invalid password</div>
                        </div>
                        <button type="submit" class="btn w-100 mb-3">Create account</button>
                    </form>
                    <p class="text-center mb-0">Already have an account ? <a href="../login_padge/index.html"
                            class="text-decoration-none"><span class="mainColor">log in</span></a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/registerFunction.js"></script>
    <script src="js/register.js"></script>
</body>

</html>
